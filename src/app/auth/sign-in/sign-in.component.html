<div class="login-card">
    <nb-card>
      <nb-card-body class="login-card-body">
        <h1 id="title" class="text-center">Login</h1>
        <p class="text-center">Hello! Log in with your email.</p>
        <form (ngSubmit)="signIn()" #form="ngForm" aria-labelledby="title">
  
          <div class="form-control-group">
            <label class="label" for="input-email">Email address:</label>
            <input nbInput fullWidth [(ngModel)]="user.email" #email="ngModel" name="email" id="input-email"
              pattern=".+@.+\..+" placeholder="Email address" autofocus
              [status]="email.dirty ? (email.invalid  ? 'danger' : 'success') : ''" [required]="true"
              [attr.aria-invalid]="email.invalid && email.touched ? true : null">
            <ng-container *ngIf="email.invalid && email.touched">
              <p class="error-message" *ngIf="email.errors?.['required']">
                Email is required!
              </p>
              <p class="error-message" *ngIf="email.errors?.['pattern']">
                Email should be the real one!
              </p>
            </ng-container>
          </div>
  
          <div class="form-control-group">
            <label class="label" for="input-password">Password:</label>
            <input nbInput fullWidth [(ngModel)]="user.password" #password="ngModel" name="password" type="password"
              id="input-password" placeholder="Password"
              [status]="password.dirty ? (password.invalid  ? 'danger' : 'success') : ''" [required]="true"
              [minlength]="1" [maxlength]="100" [attr.aria-invalid]="password.invalid && password.touched ? true : null">
            <ng-container *ngIf="password.invalid && password.touched ">
              <p class="error-message" *ngIf="password.errors?.['required']">
                Password is required!
              </p>
              <p class="error-message" *ngIf="password.errors?.['minlength'] || password.errors?.['maxlength']">
                Password should contains from 1 to 100
                characters
              </p>
            </ng-container>
          </div>
  
          <button class="login-btn" nbButton status="success" [disabled]="!form.valid" [nbSpinner]="isLoading" fullWidth>
            Log In
          </button>
        </form>
          <button nbButton (click)="googleLogin()" class="sign-in-with-google">
              <img [src]="'/assets/google.svg'"/>
          </button>
      </nb-card-body>
    </nb-card>
  </div>
